seed: 42
device: auto
task:
  image_size: 224
  num_classes: 3
  lesion_channels: 4
  use_oct: true

model:
  base_channels: 32
  bottleneck_dim: 256
  transformer_heads: 8
  transformer_layers: 2
  dropout: 0.15
  deep_supervision: true

training:
  batch_size: 4
  epochs: 3
  lr: 0.0003
  weight_decay: 0.0001
  num_workers: 0
  amp: false
  grad_clip_norm: 1.0
  early_stop_patience: 5
  checkpoint_dir: outputs/checkpoints

loss:
  dice_weight: 1.0
  focal_weight: 0.75
  cls_weight: 0.65
  consistency_weight: 0.1
